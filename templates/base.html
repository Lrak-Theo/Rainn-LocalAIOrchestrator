<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rainn</title>

  <!-- Tabler CSS framework (Bootstrap 5-based dashboard UI) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">

  <!-- Tabler icon font (provides ti-* icon classes used throughout templates) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap">

  <!-- Project-specific overrides -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>

  <div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="light">
      <div class="container-fluid">

        <h1 class="navbar-brand navbar-brand-autodark">
          <a href="{{ url_for('home_page') }}"
             class="d-flex align-items-center gap-2 text-decoration-none">
            <img src="{{ url_for('static', filename='images/Rainn_Logo.png') }}"
                 alt="Rainn"
                 class="navbar-brand-image"
                 style="height: 28px; width: auto;">
          </a>
        </h1>

        <div class="navbar-nav flex-row d-lg-none">
          <button class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#sidebar-menu"
                  aria-controls="sidebar-menu"
                  aria-expanded="false"
                  aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <div class="collapse navbar-collapse" id="sidebar-menu">
          <ul class="navbar-nav pt-lg-3">

            <!-- Home -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('home_page') }}">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <i class="ti ti-plus"></i>
                </span>
                <span class="nav-link-title">Chat</span>
              </a>
            </li>

            <!-- Agent Flows -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('flow_selection_page') }}">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <i class="ti ti-list-check"></i>
                </span>
                <span class="nav-link-title">Agent Plans</span>
              </a>
            </li>

            <!-- Create Agent Flows -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('flow_builder_page') }}">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <i class="ti ti-robot"></i>
                </span>
                <span class="nav-link-title">Create a Plan</span>
              </a>
            </li>

            <!-- Import Plan -->
            <li class="nav-item">
              <a class="nav-link" href="#" id="importPlanTrigger">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <i class="ti ti-arrow-up"></i>
                </span>
                <span class="nav-link-title">Import Plan</span>
              </a>
              <form id="importPlanForm" method="POST" action="{{ url_for('flow_import') }}" enctype="multipart/form-data" style="display:none;">
                <input id="importPlanFileInput" type="file" name="flow_file" accept=".json,application/json">
              </form>
            </li>

            <!-- Run History -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('flow_history_page') }}">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <i class="ti ti-history"></i>
                </span>
                <span class="nav-link-title">View Past Plans</span>
              </a>
            </li>

          </ul>

        </div>
      </div>
    </aside>

    <div class="page-wrapper">
      <div class="page-body">
        <div class="container-xl {% block content_container_class %}{% endblock %}">
          {% block content %}{% endblock %}
        </div>
      </div>

      <footer class="footer footer-transparent d-print-none">
      </footer>
    </div>

  </div>

  <!-- Tabler JS (handles sidebar toggle, dropdowns, and other interactive components) -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>

  <script>

    // Script to enable the user to import a flow
    document.addEventListener("DOMContentLoaded", function () {
      const trigger = document.getElementById("importPlanTrigger");
      const fileInput = document.getElementById("importPlanFileInput");
      const form = document.getElementById("importPlanForm");

      if (!trigger || !fileInput || !form) return;

      trigger.addEventListener("click", function (event) {
        event.preventDefault();
        fileInput.click();
      });

      fileInput.addEventListener("change", function () {
        if (fileInput.files && fileInput.files.length > 0) {
          form.submit();
        }
      });
    });

  </script>

  {% block scripts %}

  {% endblock %}
</body>

</html>
