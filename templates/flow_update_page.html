{% extends "base.html" %}

{% block title %}Rainn | Edit Agent{% endblock %}

{% block content %}

<!-- ==========================================
File: flow_update_page.html
Updated in iteration: 5
Author: Karl Concha

Purpose:
Edit an existing agent process configuration — name, priming, model, operation, and stages.
========================================== -->

<div class="page-header d-print-none">
  <div class="row g-2 align-items-center">
    <div class="col">
      <div class="page-pretitle">Agents</div>
      <h2 class="page-title">Edit agent</h2>
      <div class="text-secondary">Update the agent configuration and stages.</div>
    </div>
    <div class="col-auto ms-auto d-print-none">
      <a href="{{ url_for('test_agent_page') }}" class="btn btn-outline-secondary">
        <i class="ti ti-arrow-left me-2"></i>Back to Agents
      </a>
    </div>
  </div>
</div>

<div class="row row-cards">
  <div class="col-12 col-lg-8">
    <div class="card">
      <div class="card-body">

        <form method="POST" class="row g-3">

          <div class="col-12">
            <label class="form-label">Agent name</label>
            <input type="text" name="agent_name" class="form-control" value="{{ process.Agent_Name }}" required>
          </div>

          <div class="col-12">
            <label class="form-label">Agent priming</label>
            <textarea name="agent_priming" class="form-control" rows="4" placeholder="Enter the system-level instructions for this agent...">{{ process.Agent_Priming or "" }}</textarea>
          </div>

          <div class="col-12">
            <label class="form-label">AI model</label>
            <input type="text" name="ai_model" class="form-control" value="{{ process.AI_Model or "" }}" placeholder="e.g., llama3.2">
          </div>

          <div class="col-12">
            <label class="form-label">Operation / template</label>
            <select class="form-select" name="operation_selected" required>
              {% for td in taskdefs %}
                <option value="{{ td.TaskDef_ID }}"
                        {% if td.TaskDef_ID == process.Operation_Selected %} selected {% endif %}>
                  {{ td.TaskDef_Name }}
                </option>
              {% endfor %}
            </select>
          </div>

          <!-- Stages editor -->
          <div class="col-12">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <label class="form-label mb-0">Stages</label>
              <button type="button" class="btn btn-outline-secondary btn-sm" id="addStageBtn">
                <i class="ti ti-plus me-1"></i>Add stage
              </button>
            </div>

            <div id="stageContainer">
              {% if stages %}
                {% for s in stages %}
                <div class="row g-2 stage-row mb-2">
                  <div class="col-12 col-md-4">
                    <input type="text" name="stage_name[]" class="form-control" value="{{ s.TaskStageDef_Type }}" placeholder="e.g., extract, validate, output" required>
                  </div>
                  <div class="col-12 col-md-7">
                    <input type="text" name="stage_desc[]" class="form-control" value="{{ s.TaskStageDef_Description }}" placeholder="Describe what this stage should do">
                  </div>
                  <div class="col-12 col-md-1 d-flex align-items-center">
                    <button type="button" class="btn btn-outline-danger btn-sm remove-stage"><i class="ti ti-trash"></i></button>
                  </div>
                </div>
                {% endfor %}
              {% else %}
                <div class="row g-2 stage-row mb-2">
                  <div class="col-12 col-md-4">
                    <input type="text" name="stage_name[]" class="form-control" placeholder="e.g., extract, validate, output" required>
                  </div>
                  <div class="col-12 col-md-7">
                    <input type="text" name="stage_desc[]" class="form-control" placeholder="Describe what this stage should do">
                  </div>
                  <div class="col-12 col-md-1 d-flex align-items-center">
                    <button type="button" class="btn btn-outline-danger btn-sm remove-stage"><i class="ti ti-trash"></i></button>
                  </div>
                </div>
              {% endif %}
            </div>
          </div>

          <div class="col-12">
            <button class="btn btn-primary" type="submit">
              <i class="ti ti-device-floppy me-2"></i>Save changes
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<script>
  const container = document.getElementById("stageContainer");
  const addBtn = document.getElementById("addStageBtn");

  function bindRemoveButtons() {
    container.querySelectorAll(".remove-stage").forEach(btn => {
      btn.onclick = () => {
        if (container.querySelectorAll(".stage-row").length > 1) {
          btn.closest(".stage-row").remove();
        }
      };
    });
  }

  addBtn.onclick = () => {
    const row = document.createElement("div");
    row.className = "row g-2 stage-row mb-2";
    row.innerHTML = `
      <div class="col-12 col-md-4">
        <input type="text" name="stage_name[]" class="form-control" placeholder="e.g., extract, validate, output" required>
      </div>
      <div class="col-12 col-md-7">
        <input type="text" name="stage_desc[]" class="form-control" placeholder="Describe what this stage should do">
      </div>
      <div class="col-12 col-md-1 d-flex align-items-center">
        <button type="button" class="btn btn-outline-danger btn-sm remove-stage"><i class="ti ti-trash"></i></button>
      </div>
    `;
    container.appendChild(row);
    bindRemoveButtons();
  };

  bindRemoveButtons();
</script>

{% endblock %}
